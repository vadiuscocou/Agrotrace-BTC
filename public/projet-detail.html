<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projet - AgroTraceBTC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <a class="d-flex align-items-center gap-2 text-decoration-none fw-black" href="index.html"><span class="brand-mark">A</span><span>AgroTraceBTC</span></a>
      <div class="d-flex gap-3"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link" href="explorer.html">Explorer</a><a class="nav-link" href="admin.html">Admin</a></div>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <a class="btn btn-outline-light mb-4" href="index.html">Retour</a>
      <div class="row g-4 align-items-start">
        <div class="col-lg-7">
          <img id="project-image" class="w-100 rounded-2 mb-4" style="max-height:430px; object-fit:cover;" alt="">
          <div class="panel">
            <span class="tag green">Projet financeable</span>
            <h1 id="project-title" class="mt-3"></h1>
            <p id="project-meta" class="muted"></p>
            <p id="project-summary" class="lead-copy"></p>
            <div class="progress my-3"><div id="project-progress" class="progress-bar"></div></div>
            <div class="d-flex justify-content-between muted"><span id="project-money"></span><span id="project-progress-label"></span></div>
            <a id="invest-link" class="btn btn-primary btn-lg mt-4" href="#">Investir via Lightning</a>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="panel mb-4">
            <h2 class="h4">Impact attendu</h2>
            <ul id="impact-list" class="mb-0"></ul>
          </div>
          <div class="panel mb-4">
            <h2 class="h4">Jalons et preuves</h2>
            <div id="milestones"></div>
          </div>
          <div class="panel">
            <h2 class="h4">Paiements confirmes</h2>
            <div id="transactions"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>AgroTrace.loadProjectDetail();</script>
</body>
</html>
