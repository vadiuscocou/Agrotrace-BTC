<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blockchain Explorer - AgrotraceBTC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
}

/* HEADER */

.header{
  text-align:center;
  padding:25px;
  font-size:30px;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 15px #00ff88;
}

/* CONTAINER */

.container{
  max-width:900px;
}

/* BLOCS */

.block{
  background:#1e293b;
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
  border-left:4px solid #22c55e;
  transition:.3s;
}

.block:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,255,120,.25);
}

/* HASH */

.hash{
  font-size:12px;
  color:#94a3b8;
  word-break:break-all;
}

/* TAGS */

.tag{
  font-size:12px;
  padding:4px 10px;
  border-radius:8px;
  display:inline-block;
  font-weight:bold;
}

.tag.INVESTMENT{
  background:#3b82f6;
  color:white;
}

.tag.PAYMENT_CONFIRMED{
  background:#22c55e;
  color:black;
}

.tag.ESCROW_LOCK{
  background:#f59e0b;
  color:black;
}

.tag.ESCROW_RELEASE{
  background:#ef4444;
  color:white;
}

/* ANIMATIONS */

.hidden{
  opacity:0;
  transform:translateY(30px);
}

.show{
  opacity:1;
  transform:translateY(0);
  transition:.8s;
}

.pulse{
  animation:pulse .3s;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(.95);}
  100%{transform:scale(1);}
}

/* LOADING BAR */

.loading-ui::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:4px;
  z-index:9999;
  background:linear-gradient(
      90deg,
      #00ff88,
      #00c3ff
  );
  animation:loadingBar 1s linear infinite;
}

@keyframes loadingBar{
  from{
    transform:translateX(-100%);
  }
  to{
    transform:translateX(100%);
  }
}

/* BOUTON */

.btn-success{
  background:linear-gradient(
      90deg,
      #00ff88,
      #00c3ff
  );
  border:none;
  color:black;
  font-weight:bold;
}

.btn-success:hover{
  opacity:.9;
}

</style>
</head>

<body>

<div class="header">
  🔗 AgrotraceBTC Blockchain Explorer
</div>

<div class="container">

  <div class="text-center mb-4">
    <button
      id="btn"
      class="btn btn-success"
      onclick="charger()">
      🔄 Rafraîchir la blockchain
    </button>
  </div>

  <div id="ledger"></div>

</div>

<script>

let loading = false;

/* Animation dynamique */
function activerAnimations(){

  const observer = new IntersectionObserver(entries=>{

    entries.forEach(entry=>{

      if(entry.isIntersecting){
        entry.target.classList.add("show");
      }

    });

  });

  document.querySelectorAll('.block').forEach(el=>{

    el.classList.add("hidden");
    observer.observe(el);

  });

}

async function charger(){

  if(loading) return;

  loading = true;

  document.getElementById("btn").disabled = true;

  try{

    const res = await fetch('/api/ledger');
    const data = await res.json();

    const html = data
      .slice()
      .reverse()
      .map(block=>{

        const type = block.data?.type || "BLOCK";

        return `
        <div class="block">

          <div class="tag ${type}">
            ${type}
          </div>

          <h5 class="mt-3">
            Bloc #${block.index}
          </h5>

          <div class="hash">
            🔗 Hash : ${block.hash}
          </div>

          <div class="hash">
            ⬅️ Prev : ${block.prevHash}
          </div>

          <hr>

          <p>
            <b>Projet :</b>
            ${block.data?.projetId || '-'}
          </p>

          <p>
            <b>Montant :</b>
            ${(block.data?.montant || 0).toLocaleString()}
            FCFA
          </p>

          ${
            block.data?.investisseur
            ? `<p>👤 ${block.data.investisseur}</p>`
            : ''
          }

          <small class="text-secondary">
            ${block.timestamp}
          </small>

        </div>
        `;

      }).join('');

    document.getElementById('ledger').innerHTML = html;

    activerAnimations();

  }
  catch(error){

    console.error(error);

  }

  document.getElementById("btn").disabled = false;

  loading = false;
}

charger();

setInterval(charger,5000);

/* Effet clic */

document.addEventListener("click",(e)=>{

  if(e.target.classList.contains("btn")){

    e.target.classList.add("pulse");

    setTimeout(()=>{
      e.target.classList.remove("pulse");
    },300);

  }

});

/* Loading global */

const oldFetch = window.fetch;

window.fetch = async (...args)=>{

  document.body.classList.add("loading-ui");

  try{
    return await oldFetch(...args);
  }
  finally{
    document.body.classList.remove("loading-ui");
  }

};

</script>

</body>
</html>
