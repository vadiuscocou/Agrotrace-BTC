<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - AgroTraceBTC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <a class="d-flex align-items-center gap-2 text-decoration-none fw-black" href="index.html"><span class="brand-mark">A</span><span>AgroTraceBTC</span></a>
      <div class="d-flex gap-3"><a class="nav-link active" href="dashboard.html">Dashboard</a><a class="nav-link" href="explorer.html">Explorer</a><a class="nav-link" href="admin.html">Admin</a></div>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <span class="eyebrow">Pilotage temps reel</span>
      <h1 class="mt-3 mb-4">Tableau de bord des investissements</h1>
      <div class="row g-3 mb-5">
        <div class="col-md-3 col-6"><div class="metric"><span>Collecte</span><strong data-stat="funds">0</strong></div></div>
        <div class="col-md-3 col-6"><div class="metric"><span>Objectif total</span><strong data-stat="target">0</strong></div></div>
        <div class="col-md-3 col-6"><div class="metric"><span>Paiements</span><strong data-stat="payments">0</strong></div></div>
        <div class="col-md-3 col-6"><div class="metric"><span>Progression</span><strong data-stat="progress">0%</strong></div></div>
      </div>
      <div class="row g-4" id="projects-grid"></div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>AgroTrace.loadDashboard(); setInterval(AgroTrace.loadDashboard, 6000);</script>
</body>
</html>
