<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - AgrotraceBTC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <h1>📊 Dashboard AgrotraceBTC</h1>
  <p class="muted">Investissement agricole traçable via Bitcoin</p>
</header>

<main class="container mt-4">

<!-- ================= STATS ================= -->
<div class="grid mb-4">

  <div class="card">
    <h3>🌾 Projets</h3>
    <h2 id="nbProjets">0</h2>
  </div>

  <div class="card">
    <h3>💰 Fonds collectés</h3>
    <h2 id="totalFonds">0 FCFA</h2>
  </div>

  <div class="card">
    <h3>👥 Bénéficiaires</h3>
    <h2 id="beneficiaires">0</h2>
  </div>

</div>

<!-- ================= PROJETS ================= -->
<h3 class="mb-3">🔥 Projets actifs</h3>

<div id="projets" class="grid"></div>

</main>

<script>

/* =========================
   CHARGEMENT DATA
========================= */

async function charger(){

  const res = await fetch('/api/projets');
  const projets = await res.json();

  // STATS
  document.getElementById("nbProjets").innerText = projets.length;

  const total = projets.reduce((s,p)=>s+p.collecte,0);
  const bene = projets.reduce((s,p)=>s+p.beneficiaires,0);

  animateNumber("totalFonds", total);
  animateNumber("beneficiaires", bene);

  // PROJETS GRID
  document.getElementById("projets").innerHTML = projets.map(p=>{

    const pct = Math.round((p.collecte / p.objectif) * 100);

    return `
      <div class="card">

        <h4>${p.titre}</h4>
        <p class="muted">📍 ${p.region}</p>

        <div class="progress">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>

        <p>
          <b>${p.collecte.toLocaleString()}</b> / 
          ${p.objectif.toLocaleString()} FCFA
        </p>

        <span class="badge badge-info">
          ${pct}% financé
        </span>

        <div class="mt-3 d-flex gap-2">

          <button class="btn btn-primary"
            onclick="window.location.href='projet-detail.html?id=${p.id}'">
            👁 Voir
          </button>

          <button class="btn btn-success"
            onclick="window.location.href='investir.html?id=${p.id}'">
            ⚡ Investir
          </button>

        </div>

      </div>
    `;

  }).join('');

  initAnimations();
}

charger();

/* =========================
   ANIMATION COMPTEURS
========================= */

function animateNumber(id, target){

  let el = document.getElementById(id);
  let start = 0;

  let step = Math.ceil(target / 60);

  let interval = setInterval(()=>{
    start += step;
    if(start >= target){
      start = target;
      clearInterval(interval);
    }
    el.innerText = start.toLocaleString();
  }, 20);
}

/* =========================
   SCROLL ANIMATION
========================= */

function initAnimations(){

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("show");
      }
    });
  });

  document.querySelectorAll('.card')
    .forEach(el=>{
      el.classList.add("hidden");
      observer.observe(el);
    });
}

/* =========================
   GLOBAL UX EFFECT
========================= */

document.addEventListener("click",(e)=>{
  if(e.target.classList.contains("btn")){
    e.target.classList.add("pulse");
    setTimeout(()=>e.target.classList.remove("pulse"),200);
  }
});

</script>

</body>
</html>
