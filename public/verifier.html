<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vérification Blockchain - AgrotraceBTC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =========================
   THEME HACKATHON PRO
========================= */

body{
  background: linear-gradient(135deg,#071018,#0f172a);
  color:white;
  min-height:100vh;
  font-family: Arial, sans-serif;
}

header{
  text-align:center;
  padding:20px;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(0,255,120,0.2);
}

.detail-card{
  max-width:600px;
  margin:40px auto;
  padding:25px;
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,120,0.15);
  border-radius:16px;
  box-shadow:0 0 25px rgba(0,255,120,0.1);
  transition:0.4s;
}

.detail-card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 30px rgba(0,255,120,0.25);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:#0b1220;
  color:white;
  outline:none;
}

input:focus{
  border-color:#00ff88;
  box-shadow:0 0 10px rgba(0,255,120,0.3);
}

.btn-investir{
  width:100%;
  margin-top:15px;
  background: linear-gradient(90deg,#00ff88,#00d4ff);
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.btn-investir:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(0,255,120,0.4);
}

.result-card{
  max-width:600px;
  margin:20px auto;
  padding:20px;
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,120,0.15);
  border-radius:16px;
  animation: fadeIn 0.4s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

a{
  color:#00ff88;
  text-decoration:none;
}

/* animations globales */

.hidden{
  opacity:0;
  transform:translateY(30px);
  transition:all .7s ease;
}

.show{
  opacity:1;
  transform:translateY(0);
}

.pulse{
  transform:scale(0.96);
}

</style>
</head>

<body>

<header>
  <h1>🔎 Vérification Blockchain</h1>
</header>

<main>

<div class="detail-card">

  <input id="hash" placeholder="Collez le hash de transaction">

  <button class="btn-investir" onclick="verifier()">
    Vérifier sur blockchain
  </button>

</div>

<div id="resultat"></div>

</main>

<script>

/* =========================
   LOGIQUE VERIFICATION
========================= */

function verifier(){

  const hash = document.getElementById('hash').value.trim();

  if(!hash){
    alert("Veuillez entrer un hash");
    return;
  }

  document.getElementById('resultat').innerHTML = `
    <div class="result-card">

      <h5>📄 Résultat de vérification</h5>

      <p><b>Hash :</b></p>
      <p style="word-break:break-all;color:#00ff88">${hash}</p>

      <hr>

      <p>🔗 Explorer externe :</p>

      <a target="_blank"
         href="https://mempool.space">
         Ouvrir mempool.space
      </a>

      <p style="margin-top:10px;color:#aaa;font-size:13px;">
        ⚠️ Ceci est une simulation blockchain AgrotraceBTC
      </p>

    </div>
  `;
}

/* =========================
   UI ANIMATIONS GLOBALES
========================= */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll('.detail-card, .result-card')
.forEach(el=>{
  el.classList.add("hidden");
  observer.observe(el);
});

document.addEventListener("click",(e)=>{
  if(e.target.classList.contains("btn")){
    e.target.classList.add("pulse");
    setTimeout(()=>e.target.classList.remove("pulse"),300);
  }
});

</script>

</body>
</html>
