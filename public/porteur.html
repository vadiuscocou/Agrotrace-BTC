<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porteur - AgrotraceBTC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ======================
   THEME HACKATHON PRO
====================== */

body{
    background: linear-gradient(135deg,#071018,#0f172a);
    color:white;
    min-height:100vh;
}

.header{
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    color:white;
    padding:20px;
    text-align:center;
    margin-bottom:20px;
    border-bottom:1px solid rgba(0,255,120,0.2);
}

.card{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,120,0.15);
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,255,120,0.08);
    margin-bottom:15px;
    transition:0.4s;
    color:white;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 30px rgba(0,255,120,0.25);
}

textarea{
    resize:none;
    background:#0b1220 !important;
    color:white !important;
    border:1px solid rgba(255,255,255,0.15) !important;
}

/* PROGRESS BAR NEON */
.progress{
    height:10px;
    background:#1e293b;
}

.progress-bar{
    background: linear-gradient(90deg,#00ff88,#00d4ff);
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ box-shadow:0 0 6px #00ff88; }
    to{ box-shadow:0 0 18px #00d4ff; }
}

/* LOADER */
.loader{
    display:none;
    text-align:center;
    color:#00ff88;
    font-weight:bold;
    margin-bottom:15px;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:.5}
    50%{opacity:1}
    100%{opacity:.5}
}

/* ======================
   ANIMATIONS GLOBALS JS
====================== */

.hidden{
    opacity:0;
    transform:translateY(30px);
    transition:all .7s ease;
}

.show{
    opacity:1;
    transform:translateY(0);
}

.pulse{
    transform:scale(0.97);
}

.loading-ui{
    cursor:progress;
}

.badge{
    font-size:.75rem;
}

</style>
</head>

<body>

<div class="header">
    <h2>🌱 Espace Porteur de Projet</h2>
    <a href="index.html">Accueil</a>
</div>

<div class="container">

<h4 class="mb-3">📊 Mes projets</h4>

<div id="loader" class="loader">⏳ Envoi de la preuve sur blockchain...</div>

<div id="projets"></div>

</div>

<script>

async function chargerProjets(){

    const res = await fetch('/api/projets');
    const projets = await res.json();

    document.getElementById("projets").innerHTML =
        projets.map(p => {

            const pourcentage = ((p.collecte / p.objectif) * 100).toFixed(0);

            return `
            <div class="card p-3">

                <h5>${p.titre}</h5>
                <p>📍 ${p.region}</p>

                <p>
                    💰 ${p.collecte.toLocaleString()} / ${p.objectif.toLocaleString()} FCFA
                </p>

                <div class="progress mb-2">
                    <div class="progress-bar"
                        style="width:${pourcentage}%">
                        ${pourcentage}%
                    </div>
                </div>

                <hr>

                <h6>📌 Jalons blockchain</h6>

                ${(p.jalons || []).map(j => {

                    let badge = "";

                    if(j.statut === "en_attente"){
                        badge = `<span class="badge bg-warning text-dark">En attente</span>`;
                    }

                    if(j.statut === "en_validation"){
                        badge = `<span class="badge bg-info text-dark">En validation</span>`;
                    }

                    if(j.statut === "valide"){
                        badge = `<span class="badge bg-success">Validé</span>`;
                    }

                    return `
                    <div class="border p-2 mb-2 rounded">

                        <strong>${j.titre}</strong> - ${j.montant.toLocaleString()} FCFA
                        <div class="float-end">${badge}</div>

                        <br><br>

                        ${j.hashBitcoin ? `
                            <small class="text-secondary">
                                🔗 Hash: ${j.hashBitcoin}
                            </small>
                            <br>
                        ` : ''}

                        ${j.statut !== "valide" ? `
                            <textarea
                                id="desc-${p.id}-${j.id}"
                                class="form-control mb-2"
                                placeholder="Décrire la preuve..."></textarea>

                            <button class="btn btn-sm btn-primary"
                                onclick="soumettre('${p.id}','${j.id}')">
                                📤 Soumettre preuve
                            </button>
                        ` : `
                            <small class="text-success">
                                ✔ Preuve validée sur blockchain
                            </small>
                        `}
                    </div>
                    `;
                }).join('')}

            </div>
            `;
        }).join('');

    // ANIMATION SCROLL
    document.querySelectorAll('.card').forEach(el=>{
        el.classList.add('hidden');
        observer.observe(el);
    });
}

async function soumettre(projetId, jalonId){

    const desc =
        document.getElementById(`desc-${projetId}-${jalonId}`).value;

    if(!desc){
        alert("Ajoute une description");
        return;
    }

    document.getElementById("loader").style.display = "block";

    const res = await fetch('/api/jalon/soumettre', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            projetId,
            jalonId,
            description: desc
        })
    });

    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    if(data.success){
        alert("✔ Preuve envoyée avec succès");
        chargerProjets();
    } else {
        alert("Erreur");
    }
}

/* =========================
   ANIMATION ENGINE
========================= */

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.addEventListener("click", (e)=>{
    if(e.target.classList.contains("btn")){
        e.target.classList.add("pulse");
        setTimeout(()=>e.target.classList.remove("pulse"),300);
    }
});

const oldFetch = window.fetch;
window.fetch = async (...args)=>{
    document.body.classList.add("loading-ui");
    const res = await oldFetch(...args);
    document.body.classList.remove("loading-ui");
    return res;
};

chargerProjets();

</script>

</body>
</html>
