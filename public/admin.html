<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - AgrotraceBTC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =========================
   THEME HACKATHON PRO
========================= */

body{
    background: linear-gradient(135deg,#071018,#0f172a);
    color:white;
    min-height:100vh;
    font-family: Arial, sans-serif;
}

.header{
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,120,0.2);
}

.card{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,120,0.15);
    border-radius:16px;
    margin-bottom:15px;
    color:white;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(0,255,120,0.25);
}

/* BADGES */
.badge-attente{background:#f59e0b;color:black;}
.badge-validation{background:#38bdf8;color:black;}
.badge-valide{background:#22c55e;color:black;}

/* BUTTON */
.btn-action{
    font-size:13px;
}

/* LOADER */
.loader{
    display:none;
    color:#00ff88;
    font-weight:bold;
    margin:10px 0;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:.4}
    50%{opacity:1}
    100%{opacity:.4}
}

/* =========================
   ANIMATIONS GLOBALS
========================= */

.hidden{
    opacity:0;
    transform:translateY(30px);
    transition:all .7s ease;
}

.show{
    opacity:1;
    transform:translateY(0);
}

.pulse{
    transform:scale(0.96);
}

.loading-ui{
    cursor:progress;
}

</style>
</head>

<body>

<div class="header">
    <h2>🛡 Admin Dashboard - AgrotraceBTC</h2>
    <a href="index.html">Accueil</a>
</div>

<div class="container mt-4">

<h4>📊 Projets en cours</h4>

<div id="loader" class="loader">⏳ Validation blockchain en cours...</div>

<div id="projets"></div>

</div>

<script>

let isLoading = false;

async function charger(){

    const res = await fetch('/api/projets');
    const projets = await res.json();

    document.getElementById("projets").innerHTML =
    projets.map(p => {

        const jalons = p.jalons || [];

        return `
        <div class="card p-3">

            <h5>${p.titre}</h5>
            <p>📍 ${p.region}</p>

            <p>
                💰 ${p.collecte.toLocaleString()} / ${p.objectif.toLocaleString()} FCFA
            </p>

            <hr>

            <h6>🔗 Jalons blockchain</h6>

            ${jalons.map(j => {

                let badge = "";

                if(j.statut === "en_attente"){
                    badge = `<span class="badge badge-attente">En attente</span>`;
                }

                if(j.statut === "en_validation"){
                    badge = `<span class="badge badge-validation">En validation</span>`;
                }

                if(j.statut === "valide"){
                    badge = `<span class="badge badge-valide">Validé</span>`;
                }

                return `
                <div class="border p-2 mb-2 rounded">

                    <strong>${j.titre}</strong> - ${j.montant.toLocaleString()} FCFA
                    <span class="float-end">${badge}</span>

                    <br><br>

                    ${j.statut === "en_validation" ? `
                        <button class="btn btn-success btn-sm btn-action"
                            onclick="valider('${p.id}','${j.id}')">
                            ✔ Valider + libérer fonds
                        </button>
                    ` : ``}

                    ${j.statut === "valide" && j.hashBitcoin ? `
                        <div class="mt-2">
                            🔗 Blockchain:
                            <a href="https://mempool.space/testnet/tx/${j.hashBitcoin}" target="_blank">
                                voir transaction
                            </a>
                        </div>
                    ` : ``}

                </div>
                `;
            }).join('')}

        </div>
        `;
    }).join('');

    // animation scroll
    document.querySelectorAll('.card').forEach(el=>{
        el.classList.add("hidden");
        observer.observe(el);
    });
}

async function valider(projetId, jalonId){

    if(isLoading) return;

    isLoading = true;
    document.getElementById("loader").style.display = "block";

    const res = await fetch('/api/jalon/valider', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ projetId, jalonId })
    });

    const data = await res.json();

    document.getElementById("loader").style.display = "none";
    isLoading = false;

    if(data.success){
        alert("✔ Jalon validé + transaction blockchain enregistrée");
        charger();
    } else {
        alert("Erreur validation");
    }
}

/* =========================
   ANIMATION ENGINE
========================= */

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

// click effect
document.addEventListener("click",(e)=>{
  if(e.target.classList.contains("btn")){
    e.target.classList.add("pulse");
    setTimeout(()=>e.target.classList.remove("pulse"),300);
  }
});

// fetch loader UI
const oldFetch = window.fetch;
window.fetch = async (...args)=>{
    document.body.classList.add("loading-ui");
    const res = await oldFetch(...args);
    document.body.classList.remove("loading-ui");
    return res;
};

charger();

</script>

</body>
</html>
