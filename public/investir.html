<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Investir - AgroTraceBTC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <a class="d-flex align-items-center gap-2 text-decoration-none fw-black" href="index.html"><span class="brand-mark">A</span><span>AgroTraceBTC</span></a>
      <a class="nav-link" href="explorer.html">Explorer</a>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <div class="payment-box">
        <div class="row g-4">
          <div class="col-lg-6">
            <span class="eyebrow">Paiement Bitcoin Lightning</span>
            <h1 id="project-name" class="mt-3"></h1>
            <p id="project-context" class="muted"></p>
            <form class="mt-4" onsubmit="AgroTrace.createInvoice(event)">
              <label class="form-label" for="amount">Montant en FCFA</label>
              <input id="amount" class="form-control form-control-lg mb-3" type="number" min="100" step="100" required>
              <label class="form-label" for="investor">Nom de l'investisseur</label>
              <input id="investor" class="form-control form-control-lg mb-4" placeholder="Ex: Equipe Bitcoin Dev Day" required>
              <button class="btn btn-primary btn-lg w-100" type="submit">Generer une invoice</button>
            </form>
            <div id="payment-result" class="mt-4" hidden>
              <div class="d-flex gap-2 align-items-center mb-2"><span class="tag blue" id="payment-mode">Mode</span><span id="payment-status" class="toast-line"></span></div>
              <button id="simulate-payment" class="btn btn-outline-light" type="button" onclick="AgroTrace.simulatePayment()">Simuler le paiement recu</button>
            </div>
          </div>
          <div class="col-lg-6">
            <div id="qr" class="qr-frame"><span class="muted">Le QR Lightning apparaitra ici</span></div>
            <div id="invoice" class="hash mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>AgroTrace.loadInvestPage();</script>
</body>
</html>
