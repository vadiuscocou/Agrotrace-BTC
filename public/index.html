<!DOCTYPE html>
<html lang="fr">
<head>
    <style>

body{
    background:#081018;
    color:white;
    min-height:100vh;
}

.container{
    animation:fadePage .8s ease;
}

@keyframes fadePage{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:#111827;
    border:none;
    border-radius:18px;
    color:white;
    transition:.4s;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,255,120,.25);
}

.progress{
    height:12px;
    background:#1f2937;
}

.progress-bar{
    background:linear-gradient(
        90deg,
        #00ff88,
        #00d26a
    );
    transition:width 1.2s ease;
}

.btn{
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.hidden{
    opacity:0;
    transform:translateY(40px);
}

.show{
    opacity:1;
    transform:translateY(0);
    transition:.8s;
}

.pulse{
    animation:pulse .3s;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(0.95);}
    100%{transform:scale(1);}
}

.loading-ui{
    cursor:progress;
}

.loading-ui::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:linear-gradient(
        90deg,
        #00ff88,
        #00c3ff
    );
    z-index:9999;
    animation:loadingBar 1s linear infinite;
}

@keyframes loadingBar{
    from{
        transform:translateX(-100%);
    }
    to{
        transform:translateX(100%);
    }
}

</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgrotraceBTC</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center mb-3">
        🌾 AgrotraceBTC
    </h1>

    <p class="text-center text-muted">
        Investissement agricole traçable grâce à Bitcoin
    </p>

    <div class="text-center mb-4">

        <a href="dashboard.html">Dashboard</a>
        <a href="explorer.html">Explorer</a>
        <a href="verifier.html">Vérifier</a>
        <a href="porteur.html">Porteur</a>
        <a href="admin.html">Admin</a>

    </div>

    <div id="projets"></div>

</div>

<script>

async function chargerProjets() {
    try {
        const res = await fetch('/api/projets');

        if (!res.ok) {
            throw new Error("Erreur API : " + res.status);
        }

        const projets = await res.json();

        console.log("Projets reçus :", projets);

        const html = projets.map(p => {

            const pourcentage =
                ((p.collecte / p.objectif) * 100).toFixed(0);

            return `
            <div class="card mb-4">
                <div class="card-body">

                    <h3>${p.titre}</h3>
                    <p>📍 ${p.region}</p>
                    <p>👥 ${p.beneficiaires} bénéficiaires</p>

                    <p>
                        ${p.collecte.toLocaleString()}
                        /
                        ${p.objectif.toLocaleString()}
                        FCFA
                    </p>

                    <div class="progress mb-2">
                        <div class="progress-bar bg-success"
                             style="width:${pourcentage}%">
                            ${pourcentage}%
                        </div>
                    </div>

                    <!-- BADGE BLOCKCHAIN -->
                    <p>
                        <span class="badge bg-info">
                            🔗 Bitcoin traçable
                        </span>
                    </p>

                    <!-- BOUTONS ACTIONS -->
                    <div class="d-flex gap-2">

                        <a href="projet-detail.html?id=${p.id}"
                           class="btn btn-primary">
                           👁 Voir le projet
                        </a>

                        <button
                            class="btn btn-success"
                            onclick="window.location.href='investir.html?id=${p.id}'"
                        >
                            ⚡ Investir en Bitcoin
                        </button>

                    </div>

                </div>
            </div>
            `;
        }).join('');

        document.getElementById('projets').innerHTML = html;
activerAnimations();
    } catch (err) {
        console.error("ERREUR FRONT :", err);

        document.getElementById('projets').innerHTML =
            `<p style="color:red">Erreur chargement projets</p>`;
    }
}

chargerProjets();

</script>
<script>

function activerAnimations(){

    const observer = new IntersectionObserver(entries => {

        entries.forEach(entry => {

            if(entry.isIntersecting){
                entry.target.classList.add("show");
            }

        });

    });

    document.querySelectorAll('.card').forEach(el => {

        el.classList.add("hidden");
        observer.observe(el);

    });
}

// pulse boutons
document.addEventListener("click",(e)=>{

    if(
        e.target.classList.contains("btn")
    ){

        e.target.classList.add("pulse");

        setTimeout(()=>{
            e.target.classList.remove("pulse");
        },300);

    }

});

// loading global fetch
const oldFetch = window.fetch;

window.fetch = async (...args)=>{

    document.body.classList.add("loading-ui");

    try{

        return await oldFetch(...args);

    }finally{

        document.body.classList.remove("loading-ui");

    }
};

</script>
</body>
</html>
